<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Меню — Учить</title>
<style>
  :root {
    --bg: #14110d;
    --bg-card: #1f1a14;
    --bg-elev: #2a221a;
    --gold: #d4a652;
    --gold-soft: #b8893a;
    --text: #f4ede0;
    --text-dim: #a89c87;
    --green: #4ea866;
    --red: #c85a4a;
    --border: #3a2f23;
    --safe: env(safe-area-inset-bottom, 0);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px; line-height: 1.4; }
  body { padding-bottom: calc(72px + var(--safe)); min-height: 100vh; }

  /* Header */
  header { position: sticky; top: 0; z-index: 10; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 14px 16px 10px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  header h1 span { color: var(--gold); }
  header .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* Tab bar */
  nav.tabs { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: var(--bg-card); border-top: 1px solid var(--border);
    display: flex; padding-bottom: var(--safe); }
  nav.tabs button { flex: 1; background: none; border: 0; color: var(--text-dim);
    padding: 12px 4px 14px; font-size: 11px; cursor: pointer; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-family: inherit; }
  nav.tabs button .ico { font-size: 22px; line-height: 1; }
  nav.tabs button.active { color: var(--gold); }

  main { padding: 12px 14px 8px; }

  /* Category filter chips */
  .chips { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 10px;
    margin: 0 -14px; padding-left: 14px; padding-right: 14px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 7px 14px; border-radius: 999px;
    background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border);
    font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .chip.active { background: var(--gold); color: #1a1208; border-color: var(--gold); font-weight: 600; }

  /* Dish list (catalog) */
  .dish-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .dish-card { background: var(--bg-card); border-radius: 14px; overflow: hidden;
    border: 1px solid var(--border); cursor: pointer; display: flex; gap: 12px;
    padding: 10px; align-items: center; }
  .dish-card .thumb { width: 84px; height: 84px; flex-shrink: 0; border-radius: 10px;
    background: var(--bg-elev) center/cover no-repeat; position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: var(--gold-soft); }
  .dish-card .info { flex: 1; min-width: 0; }
  .dish-card .name { font-size: 14px; font-weight: 500; margin: 0 0 4px;
    line-height: 1.3; }
  .dish-card .meta { font-size: 12px; color: var(--text-dim);
    display: flex; gap: 8px; }
  .dish-card .price { color: var(--gold); font-weight: 600; }

  /* Dish detail modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: none; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg-card); width: 100%; max-width: 540px;
    max-height: 90vh; overflow-y: auto; border-radius: 18px 18px 0 0;
    padding: 0; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal .hero { width: 100%; aspect-ratio: 4/3; background: var(--bg-elev) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px; color: var(--gold-soft); }
  .modal-body { padding: 16px 18px 24px; }
  .modal h2 { font-size: 18px; margin: 0 0 8px; line-height: 1.3; }
  .modal .meta-row { display: flex; gap: 12px; color: var(--text-dim); font-size: 13px;
    margin-bottom: 14px; }
  .modal .price-big { color: var(--gold); font-weight: 600; font-size: 15px; }
  .modal h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin: 16px 0 8px; font-weight: 600; }
  .ing-list { list-style: none; padding: 0; margin: 0; }
  .ing-list li { padding: 6px 0; border-bottom: 1px solid var(--border);
    font-size: 14px; }
  .ing-list li:last-child { border-bottom: 0; }
  .allerg-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 0; padding: 0;
    list-style: none; }
  .allerg-list li { background: var(--bg-elev); padding: 5px 10px; border-radius: 8px;
    font-size: 12px; color: var(--text); border: 1px solid var(--border); }
  .modal .close { background: var(--bg-elev); color: var(--text); border: 0;
    padding: 12px; width: 100%; margin-top: 16px; border-radius: 10px;
    font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; }

  /* Flashcards */
  .fc-wrap { padding: 8px 0 14px; }
  .fc-progress { color: var(--text-dim); font-size: 13px; text-align: center;
    margin-bottom: 10px; }
  .flashcard { background: var(--bg-card); border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); min-height: 380px; cursor: pointer;
    user-select: none; transition: transform 0.15s; }
  .flashcard:active { transform: scale(0.98); }
  .flashcard .hero { width: 100%; aspect-ratio: 4/3; background: var(--bg-elev) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px; color: var(--gold-soft); }
  .fc-body { padding: 16px 18px 24px; }
  .fc-cat { color: var(--gold); font-size: 11px; text-transform: uppercase;
    letter-spacing: 1.4px; font-weight: 600; margin-bottom: 6px; }
  .fc-prompt { text-align: center; color: var(--text-dim); font-size: 14px;
    padding: 32px 16px; }
  .fc-prompt strong { color: var(--text); display: block; font-size: 16px;
    margin-bottom: 8px; font-weight: 500; }
  .fc-actions { display: flex; gap: 10px; margin-top: 14px; }
  .fc-actions button { flex: 1; padding: 14px; border-radius: 12px; border: 0;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .fc-actions .know { background: var(--green); color: white; }
  .fc-actions .dunno { background: var(--red); color: white; }
  .fc-tap-hint { text-align: center; color: var(--text-dim); font-size: 12px;
    margin-top: 10px; }

  /* Quiz */
  .quiz-modes { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .quiz-mode-btn { background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); padding: 14px 16px; border-radius: 12px; text-align: left;
    cursor: pointer; font-size: 14px; font-family: inherit;
    display: flex; align-items: center; gap: 12px; }
  .quiz-mode-btn.active { border-color: var(--gold); background: var(--bg-elev); }
  .quiz-mode-btn .ico { font-size: 22px; }
  .quiz-mode-btn .label { flex: 1; }
  .quiz-mode-btn .label strong { display: block; font-weight: 600; margin-bottom: 2px; }
  .quiz-mode-btn .label small { color: var(--text-dim); font-size: 12px; }

  .qscore { display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--bg-card); border-radius: 10px;
    margin-bottom: 12px; border: 1px solid var(--border); font-size: 13px; }
  .qscore .num { color: var(--gold); font-weight: 600; font-size: 16px; }
  .qscore button { background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 12px; border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 12px; }

  .qcard { background: var(--bg-card); border-radius: 16px; padding: 18px;
    border: 1px solid var(--border); }
  .qcard .q-hero { width: 100%; aspect-ratio: 4/3; background: var(--bg-elev) center/cover no-repeat;
    border-radius: 10px; margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px; color: var(--gold-soft); }
  .qcard .q-prompt { font-size: 14px; color: var(--text-dim); margin-bottom: 6px; }
  .qcard .q-text { font-size: 16px; font-weight: 500; margin-bottom: 16px;
    line-height: 1.4; }
  .qcard .q-ing { background: var(--bg-elev); padding: 12px 14px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px; border: 1px solid var(--border); }
  .qcard .q-ing div { padding: 3px 0; }
  .qopt { display: block; width: 100%; text-align: left; background: var(--bg-elev);
    border: 1.5px solid var(--border); color: var(--text); padding: 12px 14px;
    border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px;
    font-family: inherit; line-height: 1.35; transition: all 0.15s; }
  .qopt:hover { border-color: var(--gold-soft); }
  .qopt.correct { background: rgba(78,168,102,0.15); border-color: var(--green); }
  .qopt.wrong { background: rgba(200,90,74,0.15); border-color: var(--red); }
  .qopt:disabled { cursor: default; }

  .next-btn { background: var(--gold); color: #1a1208; border: 0; padding: 14px;
    width: 100%; border-radius: 12px; margin-top: 12px; font-size: 15px;
    font-weight: 600; cursor: pointer; font-family: inherit; }
  .next-btn:disabled { opacity: 0.4; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty .ico { font-size: 48px; margin-bottom: 12px; }

  /* Section headers in catalog */
  .sec-header { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--gold); font-weight: 600; margin: 18px 0 8px; padding-left: 4px; }
  .sec-header:first-child { margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>Меню <span>«Московский»</span></h1>
  <div class="sub" id="subtitle">40 блюд · учим состав</div>
</header>

<main id="view-catalog">
  <div class="chips" id="chips"></div>
  <div class="dish-grid" id="dishGrid"></div>
</main>

<main id="view-cards" style="display:none">
  <div class="fc-wrap">
    <div class="fc-progress" id="fcProgress"></div>
    <div class="flashcard" id="flashcard">
      <div class="hero" id="fcHero"></div>
      <div class="fc-body" id="fcBody"></div>
    </div>
    <div class="fc-tap-hint" id="fcHint">Нажми на карточку, чтобы увидеть ответ</div>
    <div class="fc-actions" id="fcActions" style="display:none">
      <button class="dunno" id="fcDunno">Не знал</button>
      <button class="know" id="fcKnow">Знал</button>
    </div>
  </div>
</main>

<main id="view-quiz" style="display:none">
  <div class="quiz-modes" id="quizModes"></div>
  <div class="qscore">
    <div><span class="num" id="qScore">0</span> / <span id="qTotal">0</span></div>
    <button id="qReset">Сбросить</button>
  </div>
  <div id="quizArea"></div>
</main>

<nav class="tabs">
  <button data-view="catalog" class="active">
    <span class="ico">📖</span><span>Каталог</span>
  </button>
  <button data-view="cards">
    <span class="ico">🎴</span><span>Карточки</span>
  </button>
  <button data-view="quiz">
    <span class="ico">🎯</span><span>Викторина</span>
  </button>
</nav>

<div class="modal-bg" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

// =========== STATE ===========
let activeView = 'catalog';
let activeCat = 'Все';
let fcQueue = [];
let fcIdx = 0;
let fcRevealed = false;
let fcStats = { known: 0, unknown: 0 };
let quizMode = 'photo-name'; // 'photo-name' | 'name-ing' | 'ing-name'
let quizScore = { correct: 0, total: 0 };
let quizCurrent = null;
let quizAnswered = false;

const CATS = ['Все', ...new Set(DISHES.map(d => d.cat))];

// =========== UTIL ===========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function $(id) { return document.getElementById(id); }

// =========== VIEW SWITCHING ===========
document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.view;
    activeView = v;
    $('view-catalog').style.display = v === 'catalog' ? 'block' : 'none';
    $('view-cards').style.display = v === 'cards' ? 'block' : 'none';
    $('view-quiz').style.display = v === 'quiz' ? 'block' : 'none';
    if (v === 'cards' && fcQueue.length === 0) startFlashcards();
    if (v === 'quiz') renderQuiz();
  });
});

// =========== CATALOG ===========
function renderChips() {
  const c = $('chips');
  c.innerHTML = '';
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'chip' + (cat === activeCat ? ' active' : '');
    b.textContent = cat;
    b.onclick = () => { activeCat = cat; renderChips(); renderCatalog(); };
    c.appendChild(b);
  });
}

function renderCatalog() {
  const g = $('dishGrid');
  g.innerHTML = '';
  const filtered = activeCat === 'Все' ? DISHES : DISHES.filter(d => d.cat === activeCat);

  if (activeCat === 'Все') {
    // Group by category
    const byCat = {};
    filtered.forEach(d => { (byCat[d.cat] = byCat[d.cat] || []).push(d); });
    Object.entries(byCat).forEach(([cat, items]) => {
      const h = document.createElement('div');
      h.className = 'sec-header';
      h.textContent = cat;
      g.appendChild(h);
      items.forEach(d => g.appendChild(makeCard(d)));
    });
  } else {
    filtered.forEach(d => g.appendChild(makeCard(d)));
  }
}

function makeCard(d) {
  const c = document.createElement('div');
  c.className = 'dish-card';
  const thumbStyle = d.img ? `background-image:url('${d.img}')` : '';
  const thumbInner = d.img ? '' : '🍽️';
  c.innerHTML = `
    <div class="thumb" style="${thumbStyle}">${thumbInner}</div>
    <div class="info">
      <div class="name">${d.name}</div>
      <div class="meta"><span class="price">${d.p} ₽</span><span>·</span><span>${d.w}</span></div>
    </div>`;
  c.onclick = () => openModal(d);
  return c;
}

function openModal(d) {
  const m = $('modalContent');
  const heroStyle = d.img ? `background-image:url('${d.img}')` : '';
  const heroInner = d.img ? '' : '🍽️';
  m.innerHTML = `
    <div class="hero" style="${heroStyle}">${heroInner}</div>
    <div class="modal-body">
      <h2>${d.name}</h2>
      <div class="meta-row">
        <span class="price-big">${d.p} ₽</span>
        <span>·</span>
        <span>${d.w}</span>
        <span>·</span>
        <span>${d.cat}</span>
      </div>
      <h3>Состав</h3>
      <ul class="ing-list">${d.mi.map(i => `<li>${i}</li>`).join('')}</ul>
      <h3>Аллергены</h3>
      <ul class="allerg-list">${d.al.map(a => `<li>${a}</li>`).join('')}</ul>
      <button class="close" onclick="closeModal()">Закрыть</button>
    </div>`;
  $('modal').classList.add('open');
}
function closeModal() { $('modal').classList.remove('open'); }
$('modal').onclick = (e) => { if (e.target === $('modal')) closeModal(); };

// =========== FLASHCARDS ===========
function startFlashcards() {
  fcQueue = shuffle(DISHES);
  fcIdx = 0;
  fcStats = { known: 0, unknown: 0 };
  showFlashcard();
}

function showFlashcard() {
  if (fcIdx >= fcQueue.length) {
    $('flashcard').innerHTML = `
      <div class="fc-prompt" style="padding-top:120px">
        <strong style="color:var(--gold); font-size:18px">🎉 Готово!</strong>
        Прошли все ${fcQueue.length} карточек<br><br>
        Знал: <strong style="color:var(--green)">${fcStats.known}</strong> ·
        Не знал: <strong style="color:var(--red)">${fcStats.unknown}</strong>
      </div>`;
    $('fcHint').style.display = 'none';
    $('fcActions').style.display = 'none';
    $('fcProgress').innerHTML = `<button class="next-btn" onclick="startFlashcards()" style="max-width:240px;margin:0 auto;display:block">Начать заново</button>`;
    return;
  }
  const d = fcQueue[fcIdx];
  fcRevealed = false;
  $('fcProgress').textContent = `${fcIdx + 1} / ${fcQueue.length}`;
  const heroStyle = d.img ? `background-image:url('${d.img}')` : '';
  $('fcHero').style.cssText = heroStyle;
  $('fcHero').innerHTML = d.img ? '' : '🍽️';
  $('fcBody').innerHTML = `<div class="fc-prompt"><strong>Что это за блюдо?</strong>Подумай и нажми, чтобы увидеть ответ</div>`;
  $('fcHint').style.display = 'block';
  $('fcActions').style.display = 'none';
}

$('flashcard').onclick = () => {
  if (fcIdx >= fcQueue.length) return;
  if (fcRevealed) return;
  fcRevealed = true;
  const d = fcQueue[fcIdx];
  $('fcBody').innerHTML = `
    <div class="fc-cat">${d.cat}</div>
    <h2 style="font-size:17px;margin:0 0 12px;line-height:1.3">${d.name}</h2>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:4px">Состав:</div>
    <ul class="ing-list" style="font-size:13px">${d.mi.map(i => `<li>${i}</li>`).join('')}</ul>
    <div style="margin-top:10px;font-size:12px;color:var(--text-dim)">${d.p} ₽ · ${d.w}</div>`;
  $('fcHint').style.display = 'none';
  $('fcActions').style.display = 'flex';
};
$('fcKnow').onclick = (e) => { e.stopPropagation(); fcStats.known++; fcIdx++; showFlashcard(); };
$('fcDunno').onclick = (e) => { e.stopPropagation(); fcStats.unknown++; fcQueue.push(fcQueue[fcIdx]); fcIdx++; showFlashcard(); };

// =========== QUIZ ===========
const QUIZ_MODES = [
  { id: 'photo-name', ico: '📸', label: 'Фото → Название', desc: 'Угадай блюдо по фотографии' },
  { id: 'name-ing', ico: '📝', label: 'Название → Состав', desc: 'Выбери правильный состав по названию' },
  { id: 'ing-name', ico: '🧪', label: 'Состав → Название', desc: 'Узнай блюдо по списку ингредиентов' }
];

function renderQuiz() {
  const modes = $('quizModes');
  modes.innerHTML = '';
  QUIZ_MODES.forEach(m => {
    const b = document.createElement('button');
    b.className = 'quiz-mode-btn' + (m.id === quizMode ? ' active' : '');
    b.innerHTML = `<span class="ico">${m.ico}</span><span class="label"><strong>${m.label}</strong><small>${m.desc}</small></span>`;
    b.onclick = () => {
      if (quizMode !== m.id) {
        quizMode = m.id;
        quizScore = { correct: 0, total: 0 };
        quizCurrent = null;
        renderQuiz();
      }
    };
    modes.appendChild(b);
  });
  $('qScore').textContent = quizScore.correct;
  $('qTotal').textContent = quizScore.total;
  $('qReset').onclick = () => {
    quizScore = { correct: 0, total: 0 };
    quizCurrent = null;
    renderQuiz();
  };
  if (!quizCurrent) nextQuizQ();
  else renderQuizCard();
}

function nextQuizQ() {
  quizAnswered = false;
  // For photo-name, only use dishes with images
  const pool = quizMode === 'photo-name' ? DISHES.filter(d => d.img) : DISHES;
  const correct = pool[Math.floor(Math.random() * pool.length)];
  // Pick 3 distractors. Prefer same category for harder distractors but allow others.
  const sameCat = DISHES.filter(d => d.cat === correct.cat && d.name !== correct.name);
  const otherCat = DISHES.filter(d => d.cat !== correct.cat);
  let distractors;
  if (sameCat.length >= 3) {
    distractors = pick(sameCat, 3);
  } else {
    distractors = [...sameCat, ...pick(otherCat, 3 - sameCat.length)];
  }
  const opts = shuffle([correct, ...distractors]);
  quizCurrent = { correct, opts };
  renderQuizCard();
}

function renderQuizCard() {
  const { correct, opts } = quizCurrent;
  const area = $('quizArea');
  let html = '<div class="qcard">';

  if (quizMode === 'photo-name') {
    html += `<div class="q-hero" style="background-image:url('${correct.img}')"></div>
             <div class="q-prompt">Какое это блюдо?</div>`;
    opts.forEach((o, i) => {
      html += `<button class="qopt" data-i="${i}">${o.name}</button>`;
    });
  } else if (quizMode === 'name-ing') {
    html += `<div class="q-prompt">${correct.cat}</div>
             <div class="q-text">${correct.name}</div>
             <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px">Какой состав соответствует?</div>`;
    opts.forEach((o, i) => {
      const ings = o.mi.slice(0, 4).join(' · ');
      html += `<button class="qopt" data-i="${i}">${ings}${o.mi.length > 4 ? ' …' : ''}</button>`;
    });
  } else { // ing-name
    html += `<div class="q-prompt">Что это за блюдо?</div>
             <div class="q-ing">${correct.mi.slice(0, 5).map(i => `<div>· ${i}</div>`).join('')}</div>`;
    opts.forEach((o, i) => {
      html += `<button class="qopt" data-i="${i}">${o.name}</button>`;
    });
  }
  html += `<button class="next-btn" id="qNext" disabled>Следующий вопрос →</button>`;
  html += '</div>';
  area.innerHTML = html;

  area.querySelectorAll('.qopt').forEach(btn => {
    btn.onclick = () => {
      if (quizAnswered) return;
      quizAnswered = true;
      const i = parseInt(btn.dataset.i);
      const chosen = opts[i];
      const correctIdx = opts.indexOf(correct);
      quizScore.total++;
      if (chosen === correct) quizScore.correct++;
      area.querySelectorAll('.qopt').forEach((b, idx) => {
        b.disabled = true;
        if (idx === correctIdx) b.classList.add('correct');
        else if (idx === i) b.classList.add('wrong');
      });
      $('qScore').textContent = quizScore.correct;
      $('qTotal').textContent = quizScore.total;
      $('qNext').disabled = false;
    };
  });
  $('qNext').onclick = () => nextQuizQ();
}

// =========== INIT ===========
renderChips();
renderCatalog();
</script>
